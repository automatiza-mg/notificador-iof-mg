name: Build Image

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v5
            
            - name: Login to Registry
              uses: docker/login-action@v3
              with:
                registry: automatiza.azurecr.io
                username: ${{ secrets.REGISTRY_USER }}
                password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Build Image
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: |
                    automatiza.azurecr.io/${{ github.repository_owner }}/notificador-iof:latest
                    automatiza.azurecr.io/${{ github.repository_owner }}/notificador-iof:${{ github.sha }}
                cache-from: type=registry,ref=automatiza.azurecr.io/${{ github.repository_owner }}/notificador-iof:latest
                cache-to: type=inline
